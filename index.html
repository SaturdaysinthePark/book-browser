<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookJumpr — Every book is a door to more books</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="BookJumpr maps the books mentioned inside other books — when a character reads one, quotes one, or name-drops one. Pick a book, browse its shelf, and jump.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f7f5f0;--ink:#141414;--accent:#141414;--card:#fdfcfa;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
a{color:var(--ink);}
a:hover{color:var(--accent);}
::selection{background:var(--ink);color:var(--paper);}
input:focus{outline:none;}
[data-hb]:hover{--hb:var(--bandc);}
/* Idle home-wall spotlight: JS sets data-pulse on one random cover every ~8s, replaying
   the hover state (genre colour + springy bounce) so the wall feels alive. A data attribute
   (not a class) is used because React manages the cover's className via style-hover — it would
   clobber an added class on re-render, but never touches an unknown data-* attribute. */
@keyframes bjWallPulse{
  0%{transform:translateY(0) scale(1);}
  35%{transform:translateY(-10px) scale(1.12);}
  62%{transform:translateY(-4px) scale(1.06);}
  100%{transform:translateY(0) scale(1);}
}
[data-pulse]{z-index:80;}
[data-pulse] [data-hb]{--hb:var(--bandc);animation:bjWallPulse 1.4s cubic-bezier(.3,1.6,.45,1);}
@media (prefers-reduced-motion:reduce){[data-pulse] [data-hb]{animation:none;}}
/* Shuffle: the hero's shuffle button reseeds the wall; each reused cell flips/deals in its new
   book, staggered by --shuf-delay for a ripple. Two identical classes (a/b) alternate per shuffle
   so the className changes and the CSS animation re-triggers on every click. */
@keyframes bjShuffleIn{
  0%{opacity:0;transform:perspective(620px) rotateX(-30deg) translateY(14px) scale(.9);}
  55%{opacity:1;}
  100%{opacity:1;transform:perspective(620px) rotateX(0) translateY(0) scale(1);}
}
/* fill-mode: backwards (not both) — hold the start frame through the stagger delay so covers wait
   hidden then flip in, but DON'T retain the end frame, which would override the :hover lift after. */
.bj-shuffle-a,.bj-shuffle-b{animation:bjShuffleIn .5s cubic-bezier(.3,1.2,.5,1) backwards;animation-delay:var(--shuf-delay,0s);}
@media (prefers-reduced-motion:reduce){.bj-shuffle-a,.bj-shuffle-b{animation:none;}}
button{color:inherit;}
</style>
<style>
/* Standalone page shell (mirrors the design runtime's full-page CSS). */
html,body{height:100%;}
#app{min-height:100%;}
</style>
<style>
/* Network tab — the constellation canvas + its chrome, scoped to .bj-constellation and
   retokenized to the site's design language (Instrument Serif + IBM Plex Mono, paper/ink/card,
   1.5px ink borders, rounded panels, hard 0 Npx 0 shadows). */
:root{--hdr-h:56px;}
@media (max-width:639px){:root{--hdr-h:68px;}}  /* mobile header is taller (44px icon-nav tap targets) */
.bj-constellation{position:relative;height:calc(100dvh - var(--hdr-h));width:100%;overflow:hidden;background:var(--paper);font-family:'IBM Plex Mono',monospace;color:var(--ink);}
.bj-constellation #wrap{position:absolute;inset:0;overflow:hidden;cursor:grab;touch-action:none;}
.bj-constellation #canvas{position:absolute;inset:0;display:block;}
.bj-constellation #hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.04em;opacity:.45;pointer-events:none;z-index:5;text-align:center;max-width:70%;}
.bj-constellation #pathHint{position:absolute;top:64px;left:50%;transform:translateX(-50%);display:none;z-index:22;background:var(--card);border:1.5px solid var(--ink);border-radius:12px;box-shadow:0 3px 0 rgba(20,20,20,.85);padding:9px 14px;font-size:11.5px;line-height:1.4;text-align:center;max-width:min(360px,80%);animation:cstlFade .15s ease;}

.bj-constellation .cstl-topbar{display:contents;}
.bj-constellation .cstl-right{position:absolute;top:14px;right:14px;z-index:16;display:flex;align-items:center;gap:10px;max-width:calc(100% - 28px);}
.bj-constellation .cstl-search{position:relative;width:300px;max-width:none;flex:1 1 auto;min-width:0;}
.bj-constellation .cstl-search input{height:44px;width:100%;box-sizing:border-box;border:1.5px solid var(--ink);border-radius:999px;padding:0 20px;font-size:13.5px;background:var(--paper);color:var(--ink);font-family:'IBM Plex Mono',monospace;box-shadow:0 4px 0 rgba(20,20,20,.9);}
.bj-constellation .dropdown{position:absolute;top:calc(100% + 8px);right:0;width:300px;max-width:86vw;background:var(--card);border:1.5px solid var(--ink);border-radius:14px;overflow:hidden;box-shadow:0 4px 0 rgba(20,20,20,.9);z-index:60;display:none;animation:cstlFade .12s ease;}
.bj-constellation .dropdown .pophead{padding:8px 15px 5px;font-size:8.5px;letter-spacing:.16em;opacity:.5;border-bottom:1px solid rgba(20,20,20,.1);}
.bj-constellation .dropdown .row{padding:9px 15px;cursor:pointer;border-bottom:1px solid rgba(20,20,20,.1);}
.bj-constellation .dropdown .row:last-child{border-bottom:none;}
.bj-constellation .dropdown .row:hover{background:var(--paper);}
.bj-constellation .dropdown .row .t{font-family:'Instrument Serif',serif;font-size:15px;}
.bj-constellation .dropdown .row .s{font-size:10px;opacity:.55;margin-top:1px;}

.bj-constellation .rail{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;align-items:center;gap:7px;z-index:15;}
.bj-constellation .rail .rbtn{width:34px;height:34px;border:1.5px solid var(--ink);border-radius:999px;background:var(--card);font-size:16px;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:0;box-shadow:0 3px 0 rgba(20,20,20,.9);}
.bj-constellation .rail .rbtn:hover{background:var(--ink);color:var(--paper);}
.bj-constellation .rail .track{position:relative;width:34px;height:140px;cursor:ns-resize;touch-action:none;}
.bj-constellation .rail .track .line{position:absolute;left:50%;top:0;bottom:0;width:2px;margin-left:-1px;background:var(--ink);opacity:.22;}
.bj-constellation .rail .track .thumb{position:absolute;left:50%;top:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border-radius:999px;background:var(--card);border:1.5px solid var(--ink);box-shadow:0 2px 0 rgba(20,20,20,.9);pointer-events:none;}
.bj-constellation .rail .fit{height:28px;padding:0 10px;border:1.5px solid var(--ink);border-radius:999px;background:var(--card);font-size:9px;letter-spacing:.1em;cursor:pointer;font-family:'IBM Plex Mono',monospace;box-shadow:0 3px 0 rgba(20,20,20,.9);}
.bj-constellation .rail .fit:hover{background:var(--ink);color:var(--paper);}

.bj-constellation .cstl-modes{position:relative;flex:none;}
.bj-constellation .mbtn-compact{display:flex;align-items:center;justify-content:center;position:relative;width:44px;height:44px;flex:none;border:1.5px solid var(--ink);border-radius:999px;background:var(--card);box-shadow:0 4px 0 rgba(20,20,20,.9);cursor:pointer;padding:0;color:var(--ink);}
.bj-constellation .mbtn-compact:hover{background:var(--ink);color:var(--paper);}
.bj-constellation .mbtn-compact .dot{display:none;position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:999px;background:#9c3d22;border:1.5px solid var(--card);}
.bj-constellation .mbtn-compact.filtered .dot{display:block;}
.bj-constellation .modes-pop{position:absolute;top:calc(100% + 8px);left:0;width:168px;background:var(--card);border:1.5px solid var(--ink);border-radius:14px;overflow:hidden;box-shadow:0 4px 0 rgba(20,20,20,.9);z-index:60;display:none;animation:cstlFade .12s ease;}
.bj-constellation .modes-pop.open{display:block;}
.bj-constellation .modes-pop .row{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;box-sizing:border-box;padding:10px 15px;border:none;border-bottom:1px solid rgba(20,20,20,.1);background:none;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:var(--ink);cursor:pointer;text-align:left;}
.bj-constellation .modes-pop .row:last-child{border-bottom:none;}
.bj-constellation .modes-pop .row:hover{background:var(--paper);}
.bj-constellation .modes-pop .row .ck{opacity:0;font-size:11px;}
.bj-constellation .modes-pop .row.active .ck{opacity:1;}

.bj-constellation .chip{position:absolute;left:18px;bottom:18px;width:288px;box-sizing:border-box;z-index:20;display:none;background:var(--card);border:1.5px solid var(--ink);border-radius:16px;box-shadow:0 4px 0 rgba(20,20,20,.9);padding:16px 18px;animation:cstlFade .15s ease;}
.bj-constellation .chip .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.bj-constellation .chip .name{font-family:'Instrument Serif',serif;font-size:22px;line-height:1.12;min-width:0;}
.bj-constellation .chip .x{border:none;background:none;cursor:pointer;font-size:15px;opacity:.5;padding:0 0 0 4px;flex:none;font-family:inherit;color:inherit;}
.bj-constellation .chip .author{font-size:11px;opacity:.7;margin-top:3px;}
.bj-constellation .chip .sub{font-size:9.5px;opacity:.55;margin-top:6px;letter-spacing:.05em;}
.bj-constellation .chip .strong{display:flex;align-items:baseline;gap:7px;margin-top:10px;padding-top:9px;border-top:1px solid rgba(20,20,20,.12);cursor:pointer;}
.bj-constellation .chip .strong:hover{background:var(--paper);}
.bj-constellation .chip .strong .lbl{font-size:8.5px;letter-spacing:.12em;color:#9c3d22;flex:none;}
.bj-constellation .chip .strong .sn{font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bj-constellation .chip .btns{display:flex;gap:8px;margin-top:13px;}
.bj-constellation .chip .btns button{padding:8px 14px;border:1.5px solid var(--ink);border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;}
.bj-constellation .chip .btns .details{background:var(--ink);color:var(--paper);}
.bj-constellation .chip .btns .open{background:var(--card);color:var(--ink);}
.bj-constellation .chip .btns .open:hover{background:var(--ink);color:var(--paper);}

.bj-constellation .panel{position:absolute;left:18px;bottom:18px;width:330px;box-sizing:border-box;max-height:calc(100% - 36px);display:none;flex-direction:column;background:var(--card);border:1.5px solid var(--ink);border-radius:18px;box-shadow:0 4px 0 rgba(20,20,20,.9);z-index:22;overflow:hidden;animation:cstlFade .15s ease;}
.bj-constellation .panel .head{padding:16px 18px 12px;border-bottom:1px solid rgba(20,20,20,.14);flex:none;}
.bj-constellation .panel .head .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.bj-constellation .panel .head .name{font-family:'Instrument Serif',serif;font-size:24px;line-height:1.1;}
.bj-constellation .panel .head .x{border:none;background:none;cursor:pointer;font-size:15px;opacity:.5;padding:0;font-family:inherit;color:inherit;}
.bj-constellation .panel .head .author{font-size:11px;opacity:.7;margin-top:4px;}
.bj-constellation .panel .head .sub{font-size:9.5px;opacity:.55;margin-top:5px;letter-spacing:.05em;}
.bj-constellation .panel .head .syn{font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;line-height:1.5;opacity:.8;margin-top:10px;}
.bj-constellation .panel .body{flex:1;overflow-y:auto;min-height:0;padding:6px 0;}
.bj-constellation .panel .seclabel{padding:9px 18px 3px;font-size:9px;letter-spacing:.14em;font-weight:500;}
.bj-constellation .panel .item{display:flex;align-items:baseline;gap:8px;padding:7px 18px;cursor:pointer;}
.bj-constellation .panel .item:hover{background:var(--paper);}
.bj-constellation .panel .item .n{font-family:'Instrument Serif',serif;font-style:italic;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bj-constellation .panel .item .w{margin-left:auto;flex:none;font-size:9.5px;opacity:.55;}

@keyframes cstlFade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.bj-constellation.is-mobile #hint{display:none;}
.bj-constellation.is-mobile .cstl-topbar{display:flex;position:absolute;top:10px;left:10px;right:10px;gap:8px;align-items:center;z-index:16;box-sizing:border-box;max-width:100%;}
.bj-constellation.is-mobile .cstl-right{position:relative;top:auto;right:auto;max-width:none;flex:1.4 1 0%;min-width:0;gap:8px;}
.bj-constellation.is-mobile .cstl-search{flex:1 1 auto;min-width:0;}
.bj-constellation.is-mobile .cstl-search input{padding:0 14px;font-size:16px;min-width:0;}
.bj-constellation.is-mobile .dropdown{left:0;right:0;width:auto;max-width:none;}
.bj-constellation.is-mobile .rail{position:relative;top:auto;right:auto;bottom:auto;transform:none;flex:1 1 0%;min-width:0;flex-direction:row;align-items:center;gap:6px;}
.bj-constellation.is-mobile .rail #zoomIn,.bj-constellation.is-mobile .rail #zoomOut{display:none;}
.bj-constellation.is-mobile .rail .track{width:auto;height:36px;flex:1 1 auto;min-width:80px;cursor:ew-resize;order:2;}
.bj-constellation.is-mobile .rail .track .line{left:0;right:0;top:50%;bottom:auto;width:auto;height:2px;margin:-1px 0 0 0;}
.bj-constellation.is-mobile .rail .track .thumb{width:20px;height:20px;margin:-10px 0 0 -10px;}
.bj-constellation.is-mobile .rail .fit{order:4;flex:none;}
.bj-constellation.is-mobile .chip{left:10px;right:10px;bottom:10px;width:auto;padding:14px 16px;}
.bj-constellation.is-mobile .panel{left:0;right:0;bottom:0;width:auto;max-height:62%;border-radius:18px 18px 0 0;border-left:none;border-right:none;border-bottom:none;}
</style>
</head>
<body>
<div id="app"></div>

<!-- Exact BookJumpr v2 template markup, compiled by app.js into a real React tree. -->
<script type="text/html" id="bj-template">

<div style="min-height:100dvh;">

  <sc-if value="{{ showChrome }}" hint-placeholder-val="{{ false }}">
  <div style="position:sticky;top:0;z-index:60;background:var(--paper);border-bottom:1.5px solid var(--ink);">
    <div style="max-width:1240px;margin:0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:10px 20px;box-sizing:border-box;">
      <button onClick="{{ goHome }}" style="display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:0;">
        <svg width="36" height="21" viewBox="0 0 62 36" style="overflow:visible;">
          <path id="bj-hdr-arc" d="M4 30 Q 30 -8 58 23" fill="none" stroke="var(--ink)" stroke-width="2" stroke-dasharray="3 3.4"></path>
          <path d="M4 30 Q 30 -8 58 23" fill="none" stroke="var(--paper)" stroke-width="5.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="0">
            <animate attributeName="stroke-dashoffset" values="0;-100" begin="0.25s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.45 0 0.55 1"></animate>
          </path>
          <circle cx="4" cy="30" r="2.4" fill="var(--ink)"></circle>
          <g opacity="0">
            <rect x="-4" y="-5.8" width="8" height="11.6" fill="var(--paper)" stroke="var(--ink)" stroke-width="1.9"></rect>
            <line x1="-1.7" y1="-5.8" x2="-1.7" y2="5.8" stroke="var(--ink)" stroke-width="1.5"></line>
            <animate attributeName="opacity" values="0;1" begin="0.25s" dur="0.01s" fill="freeze"></animate>
            <animateMotion begin="0.25s" dur="1.4s" rotate="auto" fill="freeze" calcMode="spline" keyPoints="0;1" keyTimes="0;1" keySplines="0.45 0 0.55 1">
              <mpath href="#bj-hdr-arc"></mpath>
            </animateMotion>
          </g>
        </svg>
        <span style="font-family:'Instrument Serif',serif;font-size:25px;letter-spacing:.01em;">BookJumpr</span>
      </button>
      <div style="flex:1;"></div>
      <sc-if value="{{ showHeaderSearch }}" hint-placeholder-val="{{ false }}">
        <div style="{{ hdrSearchWrap }}">
          <input value="{{ q }}" onChange="{{ onQ }}" onKeyDown="{{ onKey }}" onFocus="{{ onFocusHeader }}" onBlur="{{ onBlur }}" placeholder="Search a book…" style="{{ hdrInput }}"></input>
          <sc-if value="{{ showHeaderSuggest }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:46px;right:0;width:min(340px, calc(100vw - 40px));background:var(--card);border:1.5px solid var(--ink);border-radius:14px;box-shadow:0 18px 40px rgba(20,20,20,.18);overflow:hidden;z-index:80;">
              <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="0">
                <button onMouseDown="{{ s.go }}" style="display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:11px 16px;border-bottom:1px solid rgba(20,20,20,.08);" style-hover="background:var(--ink);color:var(--paper);">
                  <span style="font-family:'Instrument Serif',serif;font-size:16px;">{{ s.title }}</span>
                  <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.6;margin-left:auto;white-space:nowrap;">{{ s.sub }}</span>
                </button>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </sc-if>
      <sc-if value="{{ navText }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;">
          <button onClick="{{ goNetwork }}" style="background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.13em;text-transform:uppercase;padding:8px 10px;" style-hover="text-decoration:underline;color:var(--accent);">Network</button>
          <button onClick="{{ goStats }}" style="background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.13em;text-transform:uppercase;padding:8px 10px;" style-hover="text-decoration:underline;color:var(--accent);">Stats</button>
          <button onClick="{{ goAbout }}" style="background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.13em;text-transform:uppercase;padding:8px 10px;" style-hover="text-decoration:underline;color:var(--accent);">About</button>
        </div>
      </sc-if>
      <sc-if value="{{ navIcons }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;gap:2px;">
          <button onClick="{{ goNetwork }}" title="Network" style="{{ hdrNavBtn }}" style-hover="opacity:1;border-color:var(--ink);">
            <svg width="15" height="15" viewBox="0 0 16 16"><circle cx="3" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.5"></circle><circle cx="8" cy="4" r="2" fill="none" stroke="currentColor" stroke-width="1.5"></circle><circle cx="13" cy="11" r="2" fill="none" stroke="currentColor" stroke-width="1.5"></circle><line x1="4.2" y1="10.4" x2="6.9" y2="5.7" stroke="currentColor" stroke-width="1.5"></line><line x1="9.5" y1="5.4" x2="11.7" y2="9.6" stroke="currentColor" stroke-width="1.5"></line></svg>
          </button>
          <button onClick="{{ goStats }}" title="Stats" style="{{ hdrNavBtn }}" style-hover="opacity:1;border-color:var(--ink);">
            <svg width="15" height="15" viewBox="0 0 16 16"><rect x="2" y="9" width="3" height="5" fill="currentColor"></rect><rect x="6.5" y="5" width="3" height="9" fill="currentColor"></rect><rect x="11" y="2" width="3" height="12" fill="currentColor"></rect></svg>
          </button>
          <button onClick="{{ goAbout }}" title="About" style="{{ hdrNavBtn }}" style-hover="opacity:1;border-color:var(--ink);">
            <svg width="15" height="15" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"></circle><text x="8" y="11" text-anchor="middle" font-size="8.5" font-family="Helvetica, Arial, sans-serif" font-weight="bold" fill="currentColor">?</text></svg>
          </button>
        </div>
      </sc-if>
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ pgHome }}" hint-placeholder-val="{{ true }}">
    <div data-screen-label="Home" style="position:relative;min-height:100dvh;overflow:hidden;">
      <div data-wall="1" style="{{ wallStyle }}">
        <sc-for list="{{ wallCovers }}" as="w" hint-placeholder-count="24">
          <div onClick="{{ w.go }}" style="{{ w.wrap }}" style-hover="z-index:80;">
            <div data-hb="1" class="{{ w.shufClass }}" style="{{ w.inner }}" style-hover="transform:translateY(-8px) scale(1.1);box-shadow:0 16px 34px rgba(20,20,20,.3);">
              <div style="{{ w.cover }}">
                <div style="{{ w.top }}"><div style="{{ w.blob }}"></div></div>
                <div style="{{ w.mid }}">
                  <div style="{{ w.title }}">{{ w.titleText }}</div>
                  <div style="{{ w.divider }}"></div>
                  <div style="{{ w.author }}">{{ w.authorText }}</div>
                </div>
                <div style="{{ w.bot }}">{{ w.mark }}</div>
              </div>
            </div>
          </div>
        </sc-for>
      </div>
      <div style="{{ wallFade }}"></div>
      <div style="position:relative;z-index:5;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:40px 20px;box-sizing:border-box;pointer-events:none;">
        <div style="{{ heroCard }}">
          <div style="{{ heroArc }}">
            <svg viewBox="0 0 300 44" style="width:100%;max-width:470px;height:auto;display:block;overflow:visible;">
              <path id="bj-home-arc" d="M4 38 Q77 -20 150 38 Q192 2 235 38 Q264 16 292 38" fill="none" stroke="var(--ink)" stroke-width="1.4" stroke-dasharray="2.4 3"></path>
              <path d="M4 38 Q77 -20 150 38 Q192 2 235 38 Q264 16 292 38" fill="none" stroke="var(--card)" stroke-width="4.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="0">
                <animate attributeName="stroke-dashoffset" values="0;-50;-80;-100;-100" keyTimes="0;0.275;0.44;0.55;1" begin="0.6s" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.2 0.6 0.8 0.4;0.2 0.6 0.8 0.4;0.2 0.6 0.8 0.4;0 0 1 1"></animate>
              </path>
              <circle cx="4" cy="38" r="2.1" fill="var(--ink)"></circle>

                <span style="{{ statTitle }}">{{ ta.name }}</span>
                <span style="{{ statCapWorks }}">{{ ta.works }}</span>
                <span style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;">&times;{{ ta.count }}</span>
              </button>
            </sc-for>
          </div>
        </div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ pgNetwork }}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="Network" class="bj-constellation" ref="{{ netHostRef }}">
      <div id="wrap"><canvas id="canvas"></canvas></div>
      <div id="hint">dot = book · click to trace a book · shift-click two to thread them · esc to reset</div>
      <div id="pathHint"></div>
      <div class="cstl-topbar">
        <div class="cstl-right">
          <div class="cstl-modes" id="modes">
            <button class="mbtn-compact" id="modesCompact" title="Filter">
              <svg width="14" height="14" viewBox="0 0 16 16"><path d="M2 3h12l-4.5 6.2v3.3l-3 1.5V9.2L2 3z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path></svg>
              <span class="dot"></span>
            </button>
            <div class="modes-pop" id="modesPop">
              <button class="row active" data-mode="all">ALL<span class="ck">✓</span></button>
              <button class="row" data-mode="fiction">FICTION<span class="ck">✓</span></button>
              <button class="row" data-mode="nonfiction">NONFICTION<span class="ck">✓</span></button>
            </div>
          </div>
          <div class="cstl-search">
            <input id="search" placeholder="Search a title…"></input>
            <div class="dropdown" id="dropdown"></div>
          </div>
        </div>
        <div class="rail">
          <button class="rbtn" id="zoomIn" title="Zoom in">+</button>
          <div class="track" id="rail"><div class="line"></div><div class="thumb" id="railThumb"></div></div>
          <button class="rbtn" id="zoomOut" title="Zoom out">−</button>
          <button class="fit" id="fit" title="Fit to view">FIT</button>
        </div>
      </div>
      <div class="chip" id="chip"></div>
      <div class="panel" id="panel"></div>
    </div>
  </sc-if>

  <sc-if value="{{ pgAbout }}" hint-placeholder-val="{{ false }}">
    <div data-screen-label="About" style="max-width:660px;margin:0 auto;padding:52px 24px 90px;">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.55;">About</div>
      <h1 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(34px,6vw,46px);margin:10px 0 18px;">Books talk about books.</h1>
      <p style="font-size:16px;line-height:1.7;text-wrap:pretty;">A character picks a paperback off a shelf. A narrator quotes a novel they loved at fifteen. A biography lists what its subject read on a long voyage. BookJumpr collects those moments — <strong>explicit mentions of one book inside another</strong> — and turns them into a network you can wander.</p>
      <h2 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:26px;margin:34px 0 10px;">What counts as a mention</h2>
      <p style="font-size:16px;line-height:1.7;text-wrap:pretty;">A book has to be named on the page: read, quoted, discussed, or dropped into conversation. Footnotes, bibliographies, and back-of-book references don&rsquo;t count. Neither do allusions a critic might spot — if the text doesn&rsquo;t say the title, it&rsquo;s not in.</p>
      <h2 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:26px;margin:34px 0 10px;">How the data works</h2>
      <p style="font-size:16px;line-height:1.7;text-wrap:pretty;">The whole site is generated from two simple lists. One row per mention, one row per known book — every page, gallery, graph, and stat is derived from those.</p>
      <div style="border:1.5px solid var(--ink);border-radius:14px;background:var(--card);padding:18px 22px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.9;margin:14px 0;">
        mentions.csv&nbsp;&nbsp;&rarr;&nbsp;&nbsp;source book, mentioned book, mentioned author<br>
        books.csv&nbsp;&nbsp;&nbsp;&nbsp;&rarr;&nbsp;&nbsp;title, author, year, synopsis
      </div>
      <p style="font-size:16px;line-height:1.7;text-wrap:pretty;">Books without a row in <span style="font-family:'IBM Plex Mono',monospace;font-size:13.5px;">books.csv</span> still get a page — they just wait for a synopsis. Right now the network holds <strong>{{ st_sources }}</strong> indexed books and <strong>{{ st_links }}</strong> logged mentions.</p>
    </div>
  </sc-if>

  <sc-if value="{{ showFooter }}" hint-placeholder-val="{{ false }}">
  <div style="border-top:1.5px solid var(--ink);margin-top:0;">
    <div style="max-width:1240px;margin:0 auto;padding:18px 24px;display:flex;flex-wrap:wrap;gap:8px 18px;align-items:baseline;font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.6;">
      <span>BookJumpr</span>
      <span>&mdash; follow the books inside the books</span>
      <span style="margin-left:auto;">{{ st_links }} mentions &amp; counting</span>
    </div>
  </div>
  </sc-if>
</div>

</script>

<!-- Vendored React 18 (UMD) — no CDN, works offline and over file:// -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<!-- Data: exposes window.BookJumprData = { MENTIONS, META } -->
<script src="bookjumpr-data.js"></script>
<!-- Network tab: constellation graph data (window.BookGraph) + engine (window.Constellation) -->
<script src="constellation-data.js"></script>
<script src="constellation-view.js?v=16"></script>
<!-- The application -->
<script src="app.js"></script>
</body>
</html>
