<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BookJumpr — Constellation</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#f4f2ec;}
  *{box-sizing:border-box;}
  a{color:#1c1b18;} a:hover{color:#8f2d1a;}
  ::selection{background:#e8e2d2;}
  input{outline:none;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  #app{position:fixed; inset:0; display:flex; flex-direction:column; background:#f4f2ec; color:#1c1b18;
       font-family:'IBM Plex Mono',monospace;}

  /* ---- header ---- */
  .hdr{display:flex; align-items:center; gap:14px; padding:10px 16px; border-bottom:1px solid #d8d3c4;
       flex:none; background:#f4f2ec; z-index:20; flex-wrap:nowrap;}
  .wordmark{font-family:'Source Serif 4',Georgia,serif; font-weight:600; font-size:20px; white-space:nowrap;}
  #stat{font-size:10px; letter-spacing:0.1em; color:#8a8474; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .staging{font-size:9px; letter-spacing:0.08em; color:#8a8474; white-space:nowrap;}
  .staging a{color:#8a8474; text-decoration:none; border-bottom:1px solid rgba(138,132,116,0.4);}
  .staging a:hover{color:#8f2d1a;}
  .search{position:relative; flex:none; width:220px; margin-left:auto;}
  .search input{width:100%; padding:7px 12px; border:1px solid #1c1b18; border-radius:18px; background:#f9f8f3;
    font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .dropdown{position:absolute; top:calc(100% + 6px); right:0; width:300px; max-width:86vw; background:#f9f8f3;
    border:1px solid #1c1b18; box-shadow:4px 4px 0 rgba(28,27,24,0.12); z-index:60; animation:fadeIn 0.12s ease; display:none;}
  .dropdown .pophead{padding:7px 14px 5px; font-size:8.5px; letter-spacing:0.16em; color:#8a8474; border-bottom:1px solid #e6e1d3;}
  .dropdown .row{padding:8px 14px; cursor:pointer; border-bottom:1px solid #e6e1d3;}
  .dropdown .row:hover{background:#eee9db;}
  .dropdown .row .t{font-family:'Source Serif 4',Georgia,serif; font-size:14px;}
  .dropdown .row .s{font-size:10px; color:#8a8474; margin-top:1px;}

  /* ---- canvas area ---- */
  .stage{flex:1; min-height:0; position:relative;}
  #wrap{position:absolute; inset:0; cursor:grab; overflow:hidden; touch-action:none;}
  #canvas{position:absolute; inset:0; display:block;}
  #hint{position:absolute; bottom:12px; right:16px; font-size:10px; letter-spacing:0.05em; color:#8a8474;
    pointer-events:none; z-index:5; text-align:right;}

  /* ---- zoom rail ---- */
  .rail{position:absolute; top:14px; right:14px; display:flex; flex-direction:column; align-items:center; gap:7px; z-index:5;}
  .rail .rbtn{width:30px; height:30px; border:1px solid #1c1b18; border-radius:50%; background:#f9f8f3; font-size:14px;
    cursor:pointer; font-family:'IBM Plex Mono',monospace; padding:0;}
  .rail .rbtn:hover{background:#1c1b18; color:#f4f2ec;}
  .rail .track{position:relative; width:30px; height:150px; cursor:ns-resize; touch-action:none;}
  .rail .track .line{position:absolute; left:50%; top:0; bottom:0; width:2px; margin-left:-1px; background:#1c1b18; opacity:0.22;}
  .rail .track .thumb{position:absolute; left:50%; top:50%; width:16px; height:16px; margin:-8px 0 0 -8px; border-radius:50%;
    background:#f9f8f3; border:1px solid #1c1b18; box-shadow:2px 2px 0 rgba(28,27,24,0.15); pointer-events:none;}
  .rail .fit{height:26px; padding:0 9px; border:1px solid #1c1b18; border-radius:13px; background:#f9f8f3; font-size:9px;
    letter-spacing:0.1em; cursor:pointer; font-family:'IBM Plex Mono',monospace;}
  .rail .fit:hover{background:#1c1b18; color:#f4f2ec;}

  /* ---- focus chip ---- */
  .chip{position:absolute; left:18px; bottom:18px; width:280px; background:#f9f8f3; border:1px solid #1c1b18;
    box-shadow:5px 5px 0 rgba(28,27,24,0.15); padding:16px 18px; z-index:10; animation:fadeIn 0.15s ease; display:none;}
  .chip .top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start;}
  .chip .name{font-family:'Source Serif 4',Georgia,serif; font-weight:700; font-size:17px; line-height:1.2; min-width:0;}
  .chip .x{border:none; background:none; cursor:pointer; font-size:14px; color:#8a8474; padding:0 0 0 4px; font-family:inherit; flex:none;}
  .chip .author{font-size:11px; color:#5f5a4d; margin-top:3px;}
  .chip .sub{font-size:9.5px; color:#8a8474; margin-top:6px; letter-spacing:0.06em;}
  .chip .strong{display:flex; align-items:baseline; gap:7px; margin-top:10px; padding-top:9px; border-top:1px solid #e6e1d3; cursor:pointer;}
  .chip .strong:hover{background:#f0ecdf;}
  .chip .strong .lbl{font-size:8.5px; letter-spacing:0.12em; color:#8f2d1a; flex:none;}
  .chip .strong .sn{font-family:'Source Serif 4',Georgia,serif; font-style:italic; font-size:12.5px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .chip .btns{display:flex; gap:8px; margin-top:12px;}
  .chip .btns .details{padding:7px 14px; border:1px solid #1c1b18; background:#1c1b18; color:#f4f2ec; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; cursor:pointer;}
  .chip .btns .open{padding:7px 14px; border:1px solid #1c1b18; background:transparent; color:#1c1b18; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; cursor:pointer;}
  .chip .btns .open:hover{background:#f0ecdf;}

  /* ---- details panel ---- */
  .panel{position:absolute; left:18px; bottom:18px; width:320px; max-height:72%; display:flex; flex-direction:column;
    background:#f9f8f3; border:1px solid #1c1b18; box-shadow:5px 5px 0 rgba(28,27,24,0.15); z-index:12; animation:fadeIn 0.15s ease; display:none;}
  .panel.on{display:flex;}
  .panel .head{padding:16px 18px 12px; border-bottom:1px solid #e6e1d3; flex:none;}
  .panel .head .top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start;}
  .panel .head .name{font-family:'Source Serif 4',Georgia,serif; font-weight:700; font-size:19px; line-height:1.2;}
  .panel .head .x{border:none; background:none; cursor:pointer; font-size:14px; color:#8a8474; padding:0; font-family:inherit;}
  .panel .head .author{font-size:11px; color:#5f5a4d; margin-top:4px;}
  .panel .head .sub{font-size:9.5px; color:#8a8474; margin-top:5px; letter-spacing:0.06em;}
  .panel .head .syn{font-family:'Source Serif 4',Georgia,serif; font-size:12.5px; line-height:1.5; color:#3d3a33; margin-top:10px; font-style:italic;}
  .panel .body{flex:1; overflow-y:auto; min-height:0; padding:6px 0;}
  .panel .seclabel{padding:8px 18px 2px; font-size:9px; letter-spacing:0.14em; font-weight:600;}
  .panel .item{display:flex; align-items:baseline; gap:8px; padding:6px 18px; cursor:pointer;}
  .panel .item:hover{background:#f0ecdf;}
  .panel .item .n{font-family:'Source Serif 4',Georgia,serif; font-size:13px; font-style:italic; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .panel .item .w{margin-left:auto; flex:none; font-size:9.5px; color:#8a8474;}

  /* ---- mobile overrides ---- */
  #app.is-mobile #stat{display:none;}
  #app.is-mobile .staging{display:none;}
  #app.is-mobile #hint{display:none;}
  #app.is-mobile .search{width:120px;}
  #app.is-mobile .rail .track{height:96px;}
  #app.is-mobile .chip{left:10px; right:10px; bottom:10px; width:auto; box-shadow:4px 4px 0 rgba(28,27,24,0.15); padding:14px 16px;}
  #app.is-mobile .panel{left:0; right:0; bottom:0; width:auto; max-height:62%; border:none; border-top:1px solid #1c1b18; box-shadow:0 -4px 0 rgba(28,27,24,0.12);}

  @media (prefers-reduced-motion: reduce){
    .dropdown, .chip, .panel{animation:none;}
  }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="wordmark">BookJumpr</div>
    <div id="stat"></div>
    <div class="staging"><a href="index.html">← site</a> · network v3 · staging</div>
    <div class="search">
      <input id="search" placeholder="search…" autocomplete="off" spellcheck="false">
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="stage">
    <div id="wrap"><canvas id="canvas"></canvas></div>
    <div id="hint">dot = book · center = most connected · red = fiction, green = nonfiction · click to trace · esc to reset</div>

    <!-- zoom rail -->
    <div class="rail">
      <button class="rbtn" id="zoomIn" title="zoom in">+</button>
      <div class="track" id="rail"><div class="line"></div><div class="thumb" id="railThumb"></div></div>
      <button class="rbtn" id="zoomOut" title="zoom out">−</button>
      <button class="fit" id="fit" title="fit">FIT</button>
    </div>

    <!-- focus chip (filled by JS) -->
    <div class="chip" id="chip"></div>
    <!-- details panel (filled by JS) -->
    <div class="panel" id="panel"></div>
  </div>
</div>

<script src="constellation-data.js"></script>
<script src="constellation-view.js"></script>
<script>
  window.__constellation = new Constellation({
    root: document.getElementById('app'),
    data: window.BookGraph,
    bookUrlPattern: 'index.html#/{author}/{title}',
    showRings: true,
    labelDensity: 1,
    ambientTours: true,
  }); // exposed for staging tests / eventual SPA integration hooks
</script>
</body>
</html>
